<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Phone body -->
  <rect x="166" y="110" width="180" height="292" rx="28" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="10"/>
  <!-- Screen area -->
  <rect x="184" y="140" width="144" height="220" rx="8" fill="rgba(255,255,255,0.08)"/>
  <!-- Signal bars (pulsa indicator) -->
  <rect x="200" y="230" width="20" height="50" rx="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="228" y="210" width="20" height="70" rx="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="256" y="190" width="20" height="90" rx="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="284" y="175" width="20" height="105" rx="4" fill="rgba(96,165,250,0.9)"/>
  <!-- Home button -->
  <circle cx="256" cy="374" r="16" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.6)" stroke-width="4"/>
  <!-- Top speaker -->
  <rect x="224" y="122" width="64" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
</svg>
